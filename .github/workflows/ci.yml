name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

env:
  RUNTIME_VERSION: 0.1.0-rc.2

jobs:
  source:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - name: Verify the client-only source boundary
        run: |
          python3 -m compileall -q native scripts
          python3 scripts/verify_compliance.py --root .
          python3 -m unittest discover -s scripts -p 'test_*.py'

  client:
    strategy:
      fail-fast: false
      matrix:
        include:
          - { target: macos-aarch64, runner: macos-15, shell: bash }
          - { target: android-arm64-v8a, runner: ubuntu-24.04, shell: bash }
          - { target: android-armeabi-v7a, runner: ubuntu-24.04, shell: bash }
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 35
    defaults:
      run:
        shell: ${{ matrix.shell }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle
      - name: Install Android NDK
        if: startsWith(matrix.target, 'android-')
        run: /usr/local/lib/android/sdk/cmdline-tools/latest/bin/sdkmanager 'ndk;29.0.14206865'
      - name: Download and verify the public shared-runtime SDK and Maven repository
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          sdk="kmedia-ffmpeg-runtime-$RUNTIME_VERSION-${{ matrix.target }}-sdk.tar.gz"
          maven="kmedia-ffmpeg-runtime-$RUNTIME_VERSION-maven-repository.tar.gz"
          mkdir "$RUNNER_TEMP/runtime" "$RUNNER_TEMP/runtime-maven"
          gh release download "v$RUNTIME_VERSION" -R Shusek/KMediaFfmpegRuntime \
            --dir "$RUNNER_TEMP/runtime" --pattern "$sdk" --pattern "$maven" --pattern SHA256SUMS
          for name in "$sdk" "$maven"; do
            expected="$(awk -v p="$name" '$2 == p || $2 == "./" p {print $1}' "$RUNNER_TEMP/runtime/SHA256SUMS")"
            [[ "$expected" =~ ^[0-9a-f]{64}$ ]]
            actual="$(python3 -c 'import hashlib,sys; h=hashlib.sha256(); f=open(sys.argv[1],"rb"); [h.update(b) for b in iter(lambda:f.read(1048576),b"")]; print(h.hexdigest())' "$RUNNER_TEMP/runtime/$name")"
            test "$actual" = "$expected"
          done
          tar -xzf "$RUNNER_TEMP/runtime/$sdk" -C "$RUNNER_TEMP/runtime"
          tar -xzf "$RUNNER_TEMP/runtime/$maven" -C "$RUNNER_TEMP/runtime-maven"
      - name: Build and inspect the bridge client only
        run: |
          source_name="kmedia-ffmpeg-runtime-$RUNTIME_VERSION-corresponding-source.tar.gz"
          source_sha="$(awk -v p="$source_name" '$2 == p || $2 == "./" p {print $1}' "$RUNNER_TEMP/runtime/SHA256SUMS")"
          [[ "$source_sha" =~ ^[0-9a-f]{64}$ ]]
          args=()
          if [[ "${{ matrix.target }}" == android-* ]]; then args+=(--ndk /usr/local/lib/android/sdk/ndk/29.0.14206865); fi
          python3 -B native/build-client.py \
            --target '${{ matrix.target }}' \
            --runtime-sdk "$RUNNER_TEMP/runtime/sdk/${{ matrix.target }}" \
            --runtime-version "$RUNTIME_VERSION" --runtime-source-sha256 "$source_sha" \
            --version 0.5.0-ci --revision "$GITHUB_SHA" \
            --output "$RUNNER_TEMP/client" "${args[@]}"
      - name: Load the one shared runtime and bridge in one process
        if: matrix.target == 'macos-aarch64'
        run: |
          ./gradlew --no-daemon \
            -PkmediaFfmpegRuntimeRepository="$RUNNER_TEMP/runtime-maven/maven" \
            -PkmediaBridgeTestRuntimeSdk="$RUNNER_TEMP/runtime/sdk/macos-aarch64" \
            -PkmediaBridgeTestClientOutput="$RUNNER_TEMP/client" \
            :ffmpeg:jvmTest --tests '*.SharedRuntimeNativeIntegrationTest'
