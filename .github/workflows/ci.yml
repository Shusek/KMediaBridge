# SPDX-License-Identifier: LGPL-2.1-or-later

name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  kotlin:
    name: Kotlin (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            gradle: ./gradlew
          - os: macos-14
            gradle: ./gradlew
          - os: windows-latest
            gradle: ./gradlew.bat
    steps:
      - name: Check out source
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - name: Set up Java
        uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle
      - name: Run Kotlin Multiplatform checks
        run: ${{ matrix.gradle }} --no-daemon check

  publications:
    name: Publications and compliance
    runs-on: macos-14
    steps:
      - name: Check out source
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - name: Set up Java
        uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle
      - name: Verify staged Maven publications
        run: ./gradlew --no-daemon complianceCheck -PpublicationVersion=0.1.0-CI

  native-lgpl:
    name: Native LGPL boundary (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-14
    steps:
      - name: Check out source
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - name: Build and inspect the native runtime
        run: ./native/build-ffmpeg-unix.sh "$RUNNER_TEMP/native-work" "$RUNNER_TEMP/native-dist"
